---
# ── Node.js via NVM ───────────────────────────────────────────────────
- name: Install Node.js dependencies
  dnf:
    name:
      - gcc-c++
      - make
      - curl
    state: present

- name: Check if NVM is installed
  stat:
    path: /root/.nvm/nvm.sh
  register: nvm_installed

- name: Install NVM
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  when: not nvm_installed.stat.exists
  args:
    executable: /bin/bash

- name: Install Node.js {{ node_version }} via NVM
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm install {{ node_version }}
    nvm use {{ node_version }}
    nvm alias default {{ node_version }}
    ln -sf $(nvm which {{ node_version }}) /usr/local/bin/node
    ln -sf $(dirname $(nvm which {{ node_version }}))/npm /usr/local/bin/npm
  args:
    executable: /bin/bash

# ── Application ───────────────────────────────────────────────────────
- name: Create app directory
  file:
    path: /opt/sysmon
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy application file
  copy:
    src: app.js
    dest: /opt/sysmon/app.js
    owner: ec2-user
    group: ec2-user
    mode: "0644"

- name: Create package.json
  copy:
    dest: /opt/sysmon/package.json
    content: |
      {
        "name": "sysmon",
        "version": "1.0.0",
        "description": "System monitor REST API",
        "main": "app.js",
        "scripts": { "start": "node app.js" },
        "dependencies": {
          "express": "^4.18.2",
          "systeminformation": "^5.21.7"
        }
      }
    owner: ec2-user
    group: ec2-user

- name: Install npm dependencies
  shell: |
    cd /opt/sysmon
    /usr/local/bin/npm install --production
  args:
    executable: /bin/bash
  become_user: ec2-user

# ── Systemd Service ───────────────────────────────────────────────────
- name: Create systemd service for the app
  template:
    src: app.service.j2
    dest: /etc/systemd/system/sysmon.service
    mode: "0644"

- name: Enable and start sysmon service
  systemd:
    name: sysmon
    enabled: yes
    state: started
    daemon_reload: yes

# ── Nginx ─────────────────────────────────────────────────────────────
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Deploy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/sysmon.conf
    mode: "0644"
  notify: Restart Nginx

- name: Remove default Nginx config
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Restart Nginx

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

# ── Firewall / SELinux ────────────────────────────────────────────────
- name: Allow Nginx to connect to Node app (SELinux)
  shell: setsebool -P httpd_can_network_connect 1
  ignore_errors: yes

# ── Handlers ─────────────────────────────────────────────────────────
handlers:
  - name: Restart Nginx
    systemd:
      name: nginx
      state: restarted
