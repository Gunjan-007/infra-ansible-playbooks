
---
# ── System dependencies ───────────────────────────────────────────────
- name: Install build tools
  dnf:
    name:
      - gcc-c++
      - make
      - curl
    state: present

# ── NVM + Node.js ─────────────────────────────────────────────────────
- name: Check if NVM is already installed
  stat:
    path: /root/.nvm/nvm.sh
  register: nvm_stat

- name: Install NVM
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  args:
    executable: /bin/bash
  when: not nvm_stat.stat.exists

- name: Install Node.js {{ node_version }} and create global symlinks
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm install {{ node_version }}
    nvm use {{ node_version }}
    nvm alias default {{ node_version }}
    ln -sf "$(nvm which {{ node_version }})" /usr/local/bin/node
    ln -sf "$(dirname $(nvm which {{ node_version }}))/npm" /usr/local/bin/npm
  args:
    executable: /bin/bash

- name: Verify node is available
  command: /usr/local/bin/node --version
  register: node_ver

- name: Show Node.js version
  debug:
    msg: "Node.js version: {{ node_ver.stdout }}"

# ── Application directory ─────────────────────────────────────────────
- name: Create app directory
  file:
    path: /opt/sysmon
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Deploy application source file
  copy:
    src: app.js
    dest: /opt/sysmon/app.js
    owner: ec2-user
    group: ec2-user
    mode: "0644"

- name: Deploy package.json
  copy:
    dest: /opt/sysmon/package.json
    owner: ec2-user
    group: ec2-user
    content: |
      {
        "name": "sysmon",
        "version": "1.0.0",
        "description": "System Monitor REST API",
        "main": "app.js",
        "scripts": {
          "start": "node app.js"
        },
        "dependencies": {
          "express": "^4.18.2",
          "systeminformation": "^5.21.7"
        }
      }

- name: Install npm dependencies
  shell: |
    cd /opt/sysmon
    /usr/local/bin/npm install --production 2>&1
  args:
    executable: /bin/bash
  become_user: ec2-user

# ── Systemd service ───────────────────────────────────────────────────
- name: Deploy systemd service unit
  template:
    src: app.service.j2
    dest: /etc/systemd/system/sysmon.service
    mode: "0644"

- name: Reload systemd and start sysmon
  systemd:
    name: sysmon
    enabled: yes
    state: started
    daemon_reload: yes

- name: Verify sysmon service is running
  systemd:
    name: sysmon
  register: sysmon_status

- name: Show sysmon status
  debug:
    msg: "sysmon service state: {{ sysmon_status.status.ActiveState }}"

# ── Nginx ─────────────────────────────────────────────────────────────
- name: Install Nginx
  dnf:
    name: nginx
    state: present

- name: Remove default Nginx welcome config
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent

- name: Deploy sysmon Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/sysmon.conf
    mode: "0644"
  notify: Restart Nginx

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

# ── SELinux — allow Nginx to proxy to Node.js ─────────────────────────
- name: Allow Nginx network connect (SELinux)
  shell: setsebool -P httpd_can_network_connect 1
  ignore_errors: yes

# ── Create log file with correct permissions ──────────────────────────
- name: Create app log file
  file:
    path: /var/log/app.log
    state: touch
    owner: ec2-user
    group: ec2-user
    mode: "0644"

# ── Handlers ──────────────────────────────────────────────────────────
handlers:
  - name: Restart Nginx
    systemd:
      name: nginx
      state: restarted
